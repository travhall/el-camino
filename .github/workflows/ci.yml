name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Type check, lint, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Stub values so module-load env checks pass during CI.
      # Real secrets live in Netlify; CI only needs to type-check and unit-test.
      SQUARE_ACCESS_TOKEN: ci-stub
      PUBLIC_SQUARE_APP_ID: ci-stub
      PUBLIC_SQUARE_LOCATION_ID: ci-stub
      PUBLIC_SQUARE_ENVIRONMENT: sandbox
      ADMIN_SECRET: ci-stub-admin-secret-do-not-use
      ADMIN_PASSWORD: ci-stub
      RESEND_API_KEY: ci-stub
      EMAIL_FROM: noreply@example.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Astro check (type check)
        run: pnpm check

      - name: Unit tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    env:
      SQUARE_ACCESS_TOKEN: ci-stub
      PUBLIC_SQUARE_APP_ID: ci-stub
      PUBLIC_SQUARE_LOCATION_ID: ci-stub
      PUBLIC_SQUARE_ENVIRONMENT: sandbox
      ADMIN_SECRET: ci-stub-admin-secret-do-not-use
      ADMIN_PASSWORD: ci-stub
      RESEND_API_KEY: ci-stub
      EMAIL_FROM: noreply@example.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright (chromium only)
        run: pnpm test:e2e:chromium
        continue-on-error: true # e2e is informational until tests are stabilized against stub creds

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
